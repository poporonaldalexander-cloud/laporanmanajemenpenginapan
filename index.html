function rupiah(n){return new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",minimumFractionDigits:0}).format(n||0);}
function selisih(a,b){return Math.max(0,Math.round((new Date(b)-new Date(a))/86400000));}

function canAccess(key){return currentUser && (ROLE_ACCESS[currentUser.role]||[]).includes(key);}

// ── VALIDASI KONFLIK TANGGAL KAMAR ──────────────────────────
function cekKonflikTanggal(kamarId, checkIn, checkOut, excludeId){
  const ci = new Date(checkIn), co = new Date(checkOut);
  if(isNaN(ci.getTime())||isNaN(co.getTime())) return {konflik:false};
  if(co<=ci) return {konflik:true, alasan:"Tanggal check-out harus setelah tanggal check-in."};
  const bentrok = reservasi.find(r=>{
    if(r.kamarId!==kamarId) return false;
    if(r.status==="Checked Out") return false;
    if(excludeId && r.id===excludeId) return false;
    const rci=new Date(r.checkIn), rco=new Date(r.checkOut);
    return rci<co && rco>ci;
  });
  if(bentrok){
    const t=getTamu(bentrok.tamuId);
    const fmt=(d)=>new Date(d).toLocaleDateString("id-ID",{day:"2-digit",month:"short",year:"numeric"});
    return {konflik:true, alasan:`Kamar sudah dipesan oleh ${t?t.nama:"tamu lain"} pada ${fmt(bentrok.checkIn)} - ${fmt(bentrok.checkOut)}.`};
  }
  return {konflik:false};
}

function badge(label){
  const map={
    "Tersedia":"b-green","Aktif":"b-green","Lunas":"b-green","Selesai":"b-green","Checked In":"b-green",
    "Terisi":"b-red","Belum Bayar":"b-red","Tinggi":"b-red",
    "Maintenance":"b-yellow","Pending":"b-yellow","DP":"b-yellow","Admin":"b-yellow",
    "Confirmed":"b-blue","Normal":"b-blue","Resepsionis":"b-blue",
    "Checked Out":"b-gray","Nonaktif":"b-gray","Rendah":"b-gray",
    "Proses":"b-purple","Housekeeping":"b-purple",
  };
  return '<span class="badge '+(map[label]||"b-gray")+'">'+label+'</span>';
}

// ── HITUNG TOTAL TAGIHAN & SISA BAYAR UNTUK SATU RESERVASI ────
function hitungTagihanReservasi(resId, excludePaymentId){
  var r=getRes(resId);
  if(!r) return {total:0, sudahBayar:0, sisa:0};
  var k=getKamar(r.kamarId);
  var malam=selisih(r.checkIn, r.checkOut);
  var total=malam*(k?k.harga:0);
  var sudahBayar=pembayaran
    .filter(function(p){ return p.reservasiId===resId && p.id!==excludePaymentId; })
    .reduce(function(s,p){ return s+p.jumlah; }, 0);
  var sisa=total-sudahBayar;
  return {total:total, sudahBayar:sudahBayar, sisa: sisa>0?sisa:0};
}

// Dipanggil saat memilih reservasi di form Pembayaran — otomatis isi jumlah
function pilihReservasiBayar(resId){
  formData.reservasiId=resId;
  if(resId){
    var excludeId = (modal==="pay-edit") ? formData.id : null;
    var info=hitungTagihanReservasi(resId, excludeId);
    formData.jumlah = info.sisa>0 ? info.sisa : info.total;
  }
  re();
}

function re(){
  var active=document.activeElement;
  var fieldKey=null, selStart=null, selEnd=null;
  if(active && (active.tagName==="INPUT" || active.tagName==="TEXTAREA") && active.hasAttribute("data-field")){
    fieldKey=active.getAttribute("data-field");
    selStart=active.selectionStart;
    selEnd=active.selectionEnd;
  }
  document.getElementById("root").innerHTML=render();
  if(fieldKey){
    var el=document.querySelector('[data-field="'+fieldKey+'"]');
    if(el){
      el.focus();
      if(typeof el.setSelectionRange==="function" && selStart!==null){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }
}

// ── UPLOAD FOTO KAMAR (base64, in-memory) ───────────────────
function handleFotoChange(input){
  const file=input.files&&input.files[0];
  if(!file) return;
  if(!file.type.startsWith("image/")){ alert("File harus berupa gambar (jpg, png, dll.)"); return; }
  if(file.size>5*1024*1024){ alert("Ukuran gambar maksimal 5MB"); return; }
  const reader=new FileReader();
  reader.onload=function(e){ formData.fotoUrl=e.target.result; re(); };
  reader.readAsDataURL(file);
}
function hapusFotoForm(){ formData.fotoUrl=""; re(); }

function getLaporanData(){
  const tahun=new Date().getFullYear();
  const BULAN=["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
  const perBulan=BULAN.map(function(nm,m){
    return {bulan:nm,total:pembayaran.filter(function(p){var d=new Date(p.tglBayar);return p.status==="Lunas"&&d.getFullYear()===tahun&&d.getMonth()===m;}).reduce(function(s,p){return s+p.jumlah;},0)};
  });
  const totalLunas=pembayaran.filter(function(p){return p.status==="Lunas";}).reduce(function(s,p){return s+p.jumlah;},0);
  const totalDP=pembayaran.filter(function(p){return p.status==="DP";}).reduce(function(s,p){return s+p.jumlah;},0);
  const totalPiutang=reservasi.reduce(function(s,r){
    var k=getKamar(r.kamarId),tag=selisih(r.checkIn,r.checkOut)*(k?k.harga:0);
    var bayar=pembayaran.filter(function(p){return p.reservasiId===r.id;}).reduce(function(a,p){return a+p.jumlah;},0);
    return s+Math.max(0,tag-bayar);
  },0);
  const perMetode=["Tunai","Transfer Bank","Kartu Kredit","QRIS"].map(function(m){
    return {metode:m,total:pembayaran.filter(function(p){return p.metode===m&&p.status==="Lunas";}).reduce(function(s,p){return s+p.jumlah;},0),count:pembayaran.filter(function(p){return p.metode===m;}).length};
  });
  const perTipe=["Standard","Deluxe","Suite"].map(function(tipe){
    return {tipe:tipe,total:reservasi.reduce(function(s,r){var k=getKamar(r.kamarId);return(k&&k.tipe===tipe)?s+selisih(r.checkIn,r.checkOut)*k.harga:s;},0),count:reservasi.filter(function(r){var k=getKamar(r.kamarId);return k&&k.tipe===tipe;}).length};
  });
  return {tahun:tahun,perBulan:perBulan,totalLunas:totalLunas,totalDP:totalDP,totalPiutang:totalPiutang,perMetode:perMetode,perTipe:perTipe};
}

function exportExcel(){
  const data=getLaporanData();

  // Sheet 1: Ringkasan
  const ws1data=[
    ["LAPORAN KEUANGAN - GUEST HOUSE SEPAKAT"],

  ];

  // Sheet 2: Pendapatan Bulanan

  const ws2=XLSX.utils.aoa_to_sheet(ws2data);
  ws2["!cols"]=[{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws2,"Pendapatan Bulanan");

  // Sheet 3: Per Metode & Tipe
  const ws3data=[["Per Metode Pembayaran"],["Metode","Transaksi","Total Lunas (Rp)"]]
    .concat(data.perMetode.map(function(x){return [x.metode,x.count,x.total];}))
    .concat([[],["Per Tipe Kamar"],["Tipe","Reservasi","Est. Pendapatan (Rp)"]])
    .concat(data.perTipe.map(function(x){return [x.tipe,x.count,x.total];}));
  const ws3=XLSX.utils.aoa_to_sheet(ws3data);

  XLSX.utils.book_append_sheet(wb,ws3,"Per Metode & Tipe");

  // Sheet 4: Semua Transaksi
  const ws4data=[["ID","Reservasi","Nama Tamu","Tgl Bayar","Metode","Jumlah (Rp)","Status","No. Referensi"]]
    .concat(pembayaran.map(function(p){
      var r=getRes(p.reservasiId),t=r?getTamu(r.tamuId):null;
      return [p.id,p.reservasiId,t?t.nama:"-",p.tglBayar,p.metode,p.jumlah,p.status,p.noRef||""];
    }));

  ws4["!cols"]=[{wch:12},{wch:12},{wch:22},{wch:13},{wch:16},{wch:16},{wch:13},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws4,"Semua Transaksi");

  XLSX.writeFile(wb,"Laporan_Keuangan_GuestHouseSepakat_"+new Date().toISOString().slice(0,10)+".xlsx");
}

function renderLaporan(){

    var h=b.total>0?Math.max((b.total/maxV)*110,5):3;
    return '<div class="chart-bar-wrap">'
      +'<div class="chart-val">'+(b.total>0?(b.total/1000000).toFixed(1)+"jt":"")+'</div>'
      +'<div class="chart-bar" style="height:'+h+'px;background:'+(b.total>0?"#1D4ED8":"#E2E8F0")+'"></div>'
      +'<div class="chart-label">'+b.bulan+'</div></div>';

    +'<div class="page-title" style="margin:0">&#128202; Laporan Keuangan</div>'

    +'<table><thead><tr><th>Menu</th><th style="text-align:center">Admin</th><th style="text-align:center">Resepsionis</th><th style="text-align:center">Housekeeping</th></tr></thead><tbody>'+accessRows+'</tbody></table></div>';
}

function renderModal(){
  if(!modal) return "";
  var fd=formData;
  var body="";
  var title="";

  var kamarOpts=kamar.filter(function(k){return k.status!=="Maintenance";}).map(function(k){
    return '<option value="'+k.id+'"'+(fd.kamarId===k.id?" selected":"")+'>No. '+k.nomor+' &mdash; '+k.tipe+' &mdash; '+rupiah(k.harga)+'/malam</option>';
  }).join("");
  var tamuOpts=tamu.map(function(t){return '<option value="'+t.id+'"'+(fd.tamuId===t.id?" selected":"")+'>'+t.nama+'</option>';}).join("");
  var resOpts=reservasi.map(function(r){var t=getTamu(r.tamuId);return '<option value="'+r.id+'"'+(fd.reservasiId===r.id?" selected":"")+'>'+r.id+' &mdash; '+(t?t.nama:"-")+'</option>';}).join("");
  var kamarOpts2=kamar.map(function(k){return '<option value="'+k.id+'"'+(fd.kamarId===k.id?" selected":"")+'>No. '+k.nomor+' &mdash; '+k.tipe+'</option>';}).join("");

  if(modal.startsWith("kamar")){
    title=modal==="kamar-add"?"Tambah Kamar":"Edit Kamar";
    var fotoPreview = fd.fotoUrl
      ? '<img class="foto-preview" src="'+fd.fotoUrl+'">'
      : '<div class="foto-preview-placeholder">&#128247;</div>';
    var hapusFotoBtn = fd.fotoUrl ? '<button type="button" onclick="hapusFotoForm()" style="font-size:11px;color:#B91C1C;background:none;border:none;cursor:pointer;padding:0;margin-top:4px">Hapus foto</button>' : '';
    body='<div class="field"><label>Foto Kamar</label>'
      +'<div style="display:flex;gap:10px;align-items:center">'
      +fotoPreview
      +'<div style="flex:1"><input type="file" accept="image/*" onchange="handleFotoChange(this)" style="font-size:12.5px">'
      +hapusFotoBtn
      +'</div></div></div>'
      +'<div class="field"><label>Nomor Kamar *</label><input type="number" data-field="nomor" value="'+(fd.nomor||"")+'" oninput="setF(\'nomor\',+this.value)"></div>'
      +'<div class="field"><label>Tipe Kamar</label><select onchange="setF(\'tipe\',this.value)"><option'+(fd.tipe==="Standard"?" selected":"")+'>Standard</option><option'+(fd.tipe==="Deluxe"?" selected":"")+'>Deluxe</option><option'+(fd.tipe==="Suite"?" selected":"")+'>Suite</option></select></div>'
      +'<div class="field"><label>Harga/Malam (Rp)</label><input type="number" data-field="harga" value="'+(fd.harga||"")+'" oninput="setF(\'harga\',+this.value)"></div>'
      +'<div class="field"><label>Status</label><select onchange="setF(\'status\',this.value)"><option'+(fd.status==="Tersedia"?" selected":"")+'>Tersedia</option><option'+(fd.status==="Terisi"?" selected":"")+'>Terisi</option><option'+(fd.status==="Maintenance"?" selected":"")+'>Maintenance</option></select></div>'
      +'<div class="field-row"><div class="field"><label>Lantai</label><input type="number" data-field="lantai" value="'+(fd.lantai||"")+'" oninput="setF(\'lantai\',+this.value)"></div>'
      +'<div class="field"><label>Kapasitas (orang)</label><input type="number" data-field="kapasitas" value="'+(fd.kapasitas||"")+'" oninput="setF(\'kapasitas\',+this.value)"></div></div>'
      +'<div class="field"><label>Fasilitas</label><input data-field="fasilitas" value="'+(fd.fasilitas||"")+'" oninput="setF(\'fasilitas\',this.value)"></div>'
      +'<div class="form-btns"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveKamar()">Simpan</button></div>';
  } else if(modal.startsWith("tamu")){
    title=modal==="tamu-add"?"Tambah Tamu":"Edit Tamu";
    body='<div class="field"><label>Nama Lengkap *</label><input data-field="nama" value="'+(fd.nama||"")+'" oninput="setF(\'nama\',this.value)"></div>'
      +'<div class="field"><label>No. KTP / Paspor</label><input data-field="ktp" value="'+(fd.ktp||"")+'" oninput="setF(\'ktp\',this.value)"></div>'
      +'<div class="field-row"><div class="field"><label>Jenis Kelamin</label><select onchange="setF(\'jk\',this.value)"><option'+(fd.jk==="Laki-laki"?" selected":"")+'>Laki-laki</option><option'+(fd.jk==="Perempuan"?" selected":"")+'>Perempuan</option></select></div>'
      +'<div class="field"><label>No. HP</label><input data-field="hp" value="'+(fd.hp||"")+'" oninput="setF(\'hp\',this.value)"></div></div>'
      +'<div class="field"><label>Email</label><input type="email" data-field="email" value="'+(fd.email||"")+'" oninput="setF(\'email\',this.value)"></div>'
      +'<div class="field"><label>Kota</label><input data-field="kota" value="'+(fd.kota||"")+'" oninput="setF(\'kota\',this.value)"></div>'
      +'<div class="field"><label>Catatan</label><input data-field="catatan" value="'+(fd.catatan||"")+'" oninput="setF(\'catatan\',this.value)"></div>'
      +'<div class="form-btns"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveTamu()">Simpan</button></div>';
  } else if(modal.startsWith("res")){
    title=modal==="res-add"?"Buat Reservasi":"Edit Reservasi";
    var ml=(fd.checkIn&&fd.checkOut)?selisih(fd.checkIn,fd.checkOut):0;
    var kp=getKamar(fd.kamarId);
    var tot=ml*(kp?kp.harga:0);
    var calcBox=(ml>0&&kp)?'<div class="calc-box"><b>'+ml+' malam</b> &times; '+rupiah(kp.harga)+' = <b style="color:#1D4ED8">'+rupiah(tot)+'</b></div>':"";
    var cekBox="";
    if(fd.kamarId&&fd.checkIn&&fd.checkOut){
      var cek=cekKonflikTanggal(fd.kamarId,fd.checkIn,fd.checkOut,modal==="res-edit"?fd.id:null);
      cekBox = cek.konflik
        ? '<div class="error-box">&#9888;&#65039; '+cek.alasan+'</div>'
        : '<div class="ok-box">&#9989; Kamar tersedia pada tanggal ini</div>';
    }
    body='<div class="field"><label>Tamu *</label><select onchange="setF(\'tamuId\',this.value)"><option value="">-- Pilih Tamu --</option>'+tamuOpts+'</select></div>'
      +'<div class="field"><label>Kamar *</label><select onchange="setF(\'kamarId\',this.value)"><option value="">-- Pilih Kamar --</option>'+kamarOpts+'</select></div>'
      +'<div class="field-row"><div class="field"><label>Check-In</label><input type="date" data-field="checkIn" value="'+(fd.checkIn||"")+'" oninput="setF(\'checkIn\',this.value)"></div><div class="field"><label>Check-Out</label><input type="date" data-field="checkOut" value="'+(fd.checkOut||"")+'" oninput="setF(\'checkOut\',this.value)"></div></div>'
      +calcBox
      +cekBox
      +'<div class="field"><label>Status</label><select onchange="setF(\'status\',this.value)"><option'+(fd.status==="Pending"?" selected":"")+'>Pending</option><option'+(fd.status==="Confirmed"?" selected":"")+'>Confirmed</option><option'+(fd.status==="Checked In"?" selected":"")+'>Checked In</option><option'+(fd.status==="Checked Out"?" selected":"")+'>Checked Out</option></select></div>'
      +'<div class="field"><label>Catatan</label><input data-field="catatan" value="'+(fd.catatan||"")+'" oninput="setF(\'catatan\',this.value)"></div>'
      +'<div class="form-btns"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveRes()">Simpan</button></div>';
  } else if(modal.startsWith("pay")){
    title=modal==="pay-add"?"Tambah Pembayaran":"Edit Pembayaran";
    var tagihanBox="";
    if(fd.reservasiId){
      var excludeId=(modal==="pay-edit")?fd.id:null;
      var info=hitungTagihanReservasi(fd.reservasiId, excludeId);
      tagihanBox='<div class="calc-box">'
        +'Total Tagihan: <b>'+rupiah(info.total)+'</b><br>'
        +'Sudah Dibayar (sebelumnya): <b>'+rupiah(info.sudahBayar)+'</b><br>'
        +'Sisa yang Harus Dibayar: <b style="color:'+(info.sisa>0?"#92400E":"#065F46")+'">'+rupiah(info.sisa)+'</b>'
        +'</div>';
    }
    body='<div class="field"><label>Reservasi *</label><select onchange="pilihReservasiBayar(this.value)"><option value="">-- Pilih Reservasi --</option>'+resOpts+'</select></div>'
      +tagihanBox
      +'<div class="field"><label>Tanggal Bayar</label><input type="date" data-field="tglBayar" value="'+(fd.tglBayar||"")+'" oninput="setF(\'tglBayar\',this.value)"></div>'
      +'<div class="field"><label>Jumlah Bayar (Rp)</label><input type="number" data-field="jumlah" value="'+(fd.jumlah||"")+'" oninput="setF(\'jumlah\',+this.value)"></div>'
      +'<div class="field"><label>Metode Pembayaran</label><select onchange="setF(\'metode\',this.value)"><option'+(fd.metode==="Tunai"?" selected":"")+'>Tunai</option><option'+(fd.metode==="Transfer Bank"?" selected":"")+'>Transfer Bank</option><option'+(fd.metode==="Kartu Kredit"?" selected":"")+'>Kartu Kredit</option><option'+(fd.metode==="QRIS"?" selected":"")+'>QRIS</option></select></div>'
      +'<div class="field"><label>Status</label><select onchange="setF(\'status\',this.value)"><option'+(fd.status==="Lunas"?" selected":"")+'>Lunas</option><option'+(fd.status==="DP"?" selected":"")+'>DP</option><option'+(fd.status==="Belum Bayar"?" selected":"")+'>Belum Bayar</option></select></div>'
      +'<div class="field"><label>No. Referensi</label><input data-field="noRef" value="'+(fd.noRef||"")+'" oninput="setF(\'noRef\',this.value)"></div>'
      +'<div class="form-btns"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="savePay()">Simpan</button></div>';
  } else if(modal.startsWith("hk")){
    title=modal==="hk-add"?"Tambah Tugas":"Edit Tugas";
    body='<div class="field"><label>Kamar *</label><select onchange="setF(\'kamarId\',this.value)"><option value="">-- Pilih Kamar --</option>'+kamarOpts2+'</select></div>'
      +'<div class="field"><label>Jenis Tugas</label><select onchange="setF(\'jenis\',this.value)"><option'+(fd.jenis==="Pembersihan Kamar"?" selected":"")+'>Pembersihan Kamar</option><option'+(fd.jenis==="Ganti Linen"?" selected":"")+'>Ganti Linen</option><option'+(fd.jenis==="Laundry"?" selected":"")+'>Laundry</option><option'+(fd.jenis==="Perbaikan"?" selected":"")+'>Perbaikan</option><option'+(fd.jenis==="Pemeriksaan"?" selected":"")+'>Pemeriksaan</option></select></div>'
      +'<div class="field-row"><div class="field"><label>Status</label><select onchange="setF(\'status\',this.value)"><option'+(fd.status==="Pending"?" selected":"")+'>Pending</option><option'+(fd.status==="Proses"?" selected":"")+'>Proses</option><option'+(fd.status==="Selesai"?" selected":"")+'>Selesai</option></select></div>'
      +'<div class="field"><label>Prioritas</label><select onchange="setF(\'prioritas\',this.value)"><option'+(fd.prioritas==="Tinggi"?" selected":"")+'>Tinggi</option><option'+(fd.prioritas==="Normal"?" selected":"")+'>Normal</option><option'+(fd.prioritas==="Rendah"?" selected":"")+'>Rendah</option></select></div></div>'
      +'<div class="field"><label>Petugas</label><input data-field="petugas" value="'+(fd.petugas||"")+'" oninput="setF(\'petugas\',this.value)"></div>'
      +'<div class="field"><label>Tanggal</label><input type="date" data-field="tgl" value="'+(fd.tgl||"")+'" oninput="setF(\'tgl\',this.value)"></div>'
      +'<div class="field"><label>Catatan</label><input data-field="catatan" value="'+(fd.catatan||"")+'" oninput="setF(\'catatan\',this.value)"></div>'
      +'<div class="form-btns"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveHk()">Simpan</button></div>';
  } else if(modal.startsWith("user")){
    title=modal==="user-add"?"Tambah Pengguna":"Edit Pengguna";
    var akses=(ROLE_ACCESS[fd.role||"Resepsionis"]||[]).join(", ");
    body='<div class="field"><label>Nama Lengkap *</label><input data-field="nama" value="'+(fd.nama||"")+'" oninput="setF(\'nama\',this.value)"></div>'
      +'<div class="field-row"><div class="field"><label>Username *</label><input data-field="username" value="'+(fd.username||"")+'" oninput="setF(\'username\',this.value)"></div><div class="field"><label>Password *</label><input type="password" data-field="password" value="'+(fd.password||"")+'" oninput="setF(\'password\',this.value)"></div></div>'
      +'<div class="field"><label>Role</label><select onchange="setF(\'role\',this.value)"><option'+(fd.role==="Admin"?" selected":"")+'>Admin</option><option'+(fd.role==="Resepsionis"?" selected":"")+'>Resepsionis</option><option'+(fd.role==="Housekeeping"?" selected":"")+'>Housekeeping</option></select></div>'
      +'<div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:7px;padding:9px 11px;margin-bottom:12px;font-size:12px;color:#64748B"><b style="color:#374151">Akses '+( fd.role||"Resepsionis")+': </b>'+akses+'</div>'
      +'<div class="form-btns"><button class="btn btn-outline" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveUser()">Simpan</button></div>';
  }
  return '<div class="modal-bg"><div class="modal">'
    +'<div class="modal-head"><h3>'+title+'</h3><button class="btn btn-outline btn-sm" onclick="closeModal()" style="padding:2px 10px;font-size:16px">&times;</button></div>'
    +'<div class="modal-body">'+body+'</div>'
    +'</div></div>';
}

function render(){
  if(!currentUser) return renderLogin();
  var curNav=ALL_NAV.find(function(n){return n.key===halaman;});
  var adaCari=["kamar","tamu","reservasi","pembayaran","housekeeping","billing"].includes(halaman);
  var pageHtml="";
  if(halaman==="dashboard") pageHtml=renderDashboard();
  else if(halaman==="kamar") pageHtml=renderKamar();
  else if(halaman==="tamu") pageHtml=renderTamu();
  else if(halaman==="reservasi") pageHtml=renderReservasi();
  else if(halaman==="pembayaran") pageHtml=renderPembayaran();
  else if(halaman==="housekeeping") pageHtml=renderHousekeeping();
  else if(halaman==="billing") pageHtml=renderBilling();
  else if(halaman==="laporan"&&canAccess("laporan")) pageHtml=renderLaporan();
  else if(halaman==="pengaturan"&&canAccess("pengaturan")) pageHtml=renderPengaturan();
  return '<div class="app">'
    +renderSidebar()
    +'<div class="main">'
    +'<div class="topbar">'
    +'<div class="topbar-title">'+(curNav?curNav.icon+" "+curNav.label:"")+'</div>'
    +'<div class="topbar-right">'
    +(adaCari?'<input class="search-box" data-field="search" placeholder="Cari..." value="'+cari+'" oninput="setC(this.value)">':"")
    +'<span class="topbar-user">Login: <b>'+currentUser.username+'</b></span>'
    +'</div></div>'
    +'<div class="content">'+pageHtml+'</div>'
    +'</div>'
    +renderModal()
    +'</div>';
}

re();
</script>
